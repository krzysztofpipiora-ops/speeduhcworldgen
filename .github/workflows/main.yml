name: Build SpeedUHCWorldGen

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - run: mvn clean package
      - uses: actions/upload-artifact@v4
        with:
          name: SpeedUHCWorldGen
          path: target/SpeedUHCWorldGen-1.0.jar
